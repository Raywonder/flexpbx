; FlexPBX Internal SIP Configuration
; Generated automatically - do not edit manually

[general]
context=flexpbx-internal
allowguest=no
alwaysauthreject=yes
musiconhold=default
realm=flexpbx.internal
udpbindaddr=0.0.0.0:5070
tcpbindaddr=0.0.0.0:5070
transport=udp,tcp

; Codec settings
disallow=all
allow=g722,ulaw,alaw
dtmfmode=rfc2833
nat=force_rport,comedia
directmedia=no
qualify=yes

; Security
encryption=yes
tlsenable=yes
tlsbindaddr=0.0.0.0:5071

; Template for FlexPBX users
[flexpbx-user-template](!)
type=friend
host=dynamic
qualify=yes
canreinvite=no
context=flexpbx-internal
dtmfmode=rfc2833
nat=force_rport,comedia
directmedia=no
disallow=all
allow=g722,ulaw,alaw
