; FlexPBX Extensions Configuration
; Dialplan for internal extensions

[flexpbx-internal]
; Internal extension dialing
exten => 2001,1,Dial(SIP/testuser,20)
exten => 2001,2,Voicemail(2001@flexpbx)
exten => 2001,3,Hangup()

exten => 2000,1,Dial(SIP/admin,20)
exten => 2000,2,Voicemail(2000@flexpbx)
exten => 2000,3,Hangup()

exten => 2002,1,Dial(SIP/demo,20)
exten => 2002,2,Voicemail(2002@flexpbx)
exten => 2002,3,Hangup()

; Voicemail access
exten => *97,1,VoicemailMain(${CALLERID(num)}@flexpbx)
exten => *97,2,Hangup()

; Conference rooms
exten => 8000,1,ConfBridge(8000,flexpbx_conference)
exten => 8001,1,ConfBridge(8001,flexpbx_conference)

; Echo test
exten => 9196,1,Answer()
exten => 9196,2,Echo()
exten => 9196,3,Hangup()

; Time/Date
exten => *60,1,Answer()
exten => *60,2,SayUnixTime()
exten => *60,3,Hangup()
