<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <title>FlexPBX Desktop</title>
    <style>
        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
            margin: 0;
            padding: 20px;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
        }
        h1 {
            font-size: 48px;
            margin-bottom: 20px;
        }
        .status {
            font-size: 24px;
            background: rgba(255,255,255,0.2);
            padding: 20px;
            border-radius: 10px;
            margin: 20px;
        }
        .info {
            background: rgba(0,0,0,0.3);
            padding: 20px;
            border-radius: 10px;
            margin-top: 20px;
            max-width: 600px;
        }
        button {
            background: white;
            color: #667eea;
            border: none;
            padding: 15px 30px;
            font-size: 18px;
            border-radius: 5px;
            cursor: pointer;
            margin: 10px;
        }
        button:hover {
            background: #f0f0f0;
        }
    </style>
</head>
<body>
    <h1>🎙️ FlexPBX Desktop Manager</h1>
    <div class="status">✅ Application Loaded Successfully!</div>

    <div class="info">
        <h2>Welcome to FlexPBX Desktop v2.0</h2>
        <p>Your unified PBX management platform is now running.</p>
        <ul>
            <li>✓ Electron Framework Loaded</li>
            <li>✓ UI Rendering Working</li>
            <li>✓ Application Ready</li>
        </ul>
    </div>

    <div>
        <button onclick="alert('FlexPBX is working!')">Test Alert</button>
        <button onclick="window.close()">Close Window</button>
    </div>

    <script>
        console.log('FlexPBX UI Loaded');
        document.addEventListener('DOMContentLoaded', () => {
            console.log('DOM fully loaded');
        });
    </script>
</body>
</html>
